name: Daily Coffee Market Report

on:
  schedule:
    - cron: "0 7 * * *" # Codziennie o 07:00 UTC
  workflow_dispatch: # Pozwala uruchomić skrypt ręcznie przyciskiem

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python main.py

      - name: Commit snapshot
        run: |
          git config --global user.name 'CoffeeBot'
          git config --global user.email 'bot@coffee.ai'
          git add snapshot_*.json
          git commit -m "Update daily market snapshot" || echo "No changes to commit"
          git push
